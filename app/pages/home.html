<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../index.css">
</head>
<body>
    <div class="navbar bg-base-100">
        <div class="navbar-start">
          <a class="btn btn-ghost text-xl">Expense Tracker</a>
        </div>
        <div class="navbar-center hidden lg:flex">
          <ul class="menu menu-horizontal px-1">
            <li><a href="./home.html">Home</a></li>
            <li>
              <a href="./TransactionHistory.html">Expenses</a>
            </li>
            <li><a href="./TransactionChart.html">Data visualizer</a></li>
          </ul>
        </div>
        <div class="navbar-end">
          <a class="btn">Logout</a>
        </div>
      </div>
      <section class="flex items-center justify-evenly">
        <div class="stats  shadow-lg">
          <div class="stat">
            <div class="stat-figure text-primary">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                class="inline-block h-8 w-8 stroke-current">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
              </svg>
            </div>
            <div class="stat-title">Total Income</div>
            <div class="stat-value text-primary">25.6K</div>
            
          </div>
        
          <div class="stat">
            <div class="stat-figure text-secondary">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                class="inline-block h-8 w-8 stroke-current">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M13 10V3L4 14h7v7l9-11h-7z"></path>
              </svg>
            </div>
            <div class="stat-title">Total Expense</div>
            <div class="stat-value text-secondary">2.6M</div>
            
          </div>
        
          <div class="stat">
           
            <div class="stat-title">Net Value</div>
            <div class="stat-value">86%</div>
            <div class="stat-desc text-secondary">31 tasks remaining</div>
          </div>
        </div>
        <div>
          <div class=" flex justify-center ">
            <div
              class="bg-gray-200 dark:bg-gray-800 flex flex-col justify-center items-center mx-10 my-10 py-4 px-4  rounded-2xl"
              data-id={props.name}
            >
              <button
                onClick={props.onClick}
                class="btn btn-circle btn-outline btn-accent"
              >
            <img class="w-8" src='../assets/add-account.svg' alt="" />   
              </button>
              <p class="my-4">Add Account</p>
            </div>
            <div
              class="bg-gray-200 dark:bg-gray-800 flex flex-col justify-center items-center mx-10 my-10 py-4 px-4  rounded-2xl"
            
            >
              <button
              
                class="btn btn-circle btn-outline btn-accent"
              >
            <img class="w-8" src='../assets/add-expense.svg' alt="" />   
              </button>
              <p class="my-4">Add Transaction</p>
            </div>
          </div>
        </div>
      </section>
      <section class="grid grid-cols-2 gap-10 p-10">
        <div>
          <h1 class="text-4xl font-bold mb-4">Transaction History</h1>
          <div class="overflow-x-auto">
            <table class="table">
              <!-- head -->
              <thead>
                <tr>
                  <th>Description</th>
                  <th>Category</th>
                  <th>Type</th>
                  <th>Date</th>
                  <th>Amount</th>
                </tr>
              </thead>
              <tbody id="table_body">
               <!-- Dynamic content to be rendered her -->
              </tbody>
            </table>
          </div>
        </div>
        <div>
          <h1 class="text-4xl font-bold mb-4">Transaction Chart</h1>
          <div id="transaction_Chart">
          <canvas id="transactionChart"></canvas>
        </div>
          
        </div>
      </section>
      <script type="module" src="../features/TransactionHistory/TransactionHistory.js"></script>
      <script type="module" src="../features/Chart/TranactionChart.js"></script>
</body>
</html>
